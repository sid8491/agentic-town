<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurgaon Town Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0c0d14;
  --surface:   #12141f;
  --card:      #191c2e;
  --border:    #232640;
  --border-hi: #353870;
  --accent:    #ff8c42;
  --blue:      #4e9eff;
  --green:     #3ecf8e;
  --red:       #ff6b6b;
  --yellow:    #ffd43b;
  --text:      #e8eaf2;
  --muted:     #636882;
  --font:      'Inter', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 50px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.brand {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand-dot { color: var(--accent); }

.hud-cluster {
  display: flex;
  align-items: center;
  gap: 8px;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  user-select: none;
}
.pill .val { color: var(--text); font-variant-numeric: tabular-nums; }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pill.running .status-dot { background: var(--green); animation: blink 2s infinite; }
.pill.paused  .status-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

#llm-btn {
  padding: 4px 16px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#llm-btn:hover { background: var(--accent); color: #fff; }
#llm-btn:disabled { opacity: 0.45; cursor: wait; }

/* ── Town Overview Strip ── */
#overview {
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
  overflow-x: auto;
}

.ov-agent {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
}
.ov-agent:hover { background: var(--card); }
.ov-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700; color: #fff;
  flex-shrink: 0;
  position: relative;
}
.ov-activity-icon {
  position: absolute;
  bottom: -3px; right: -3px;
  font-size: 10px;
  line-height: 1;
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
}
.ov-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.ov-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: capitalize;
  color: var(--text);
  line-height: 1;
}
.ov-action-label {
  font-size: 10px;
  font-weight: 500;
  line-height: 1;
}
.ov-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 2px;
}

/* ── 3-column layout ── */
#layout {
  display: flex;
  height: calc(100vh - 94px); /* 50px header + 44px overview */
  overflow: hidden;
}

/* ── Left: Roster ── */
#roster {
  width: 224px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.col-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 8px 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  flex-shrink: 0;
}

.agent-card {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 9px 9px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.agent-card:hover { background: var(--card); border-color: var(--border); }
.agent-card.active { background: var(--card); border-color: var(--border-hi); }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
}

#avatar-zoom {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.82);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
#avatar-zoom.visible {
  opacity: 1;
  transform: scale(1);
}
#avatar-zoom img {
  width: 240px; height: 240px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,0.75), 0 0 0 3px rgba(255,255,255,0.12);
}

.agent-body { flex: 1; min-width: 0; }

.agent-name {
  font-weight: 600;
  font-size: 13px;
  text-transform: capitalize;
  margin-bottom: 3px;
}

/* ── Activity badge — the hero element ── */
.activity-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid;
  margin-bottom: 6px;
  max-width: 100%;
  overflow: hidden;
}
.activity-badge .act-icon { flex-shrink: 0; font-size: 12px; }
.activity-badge .act-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.agent-loc {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.need-bars { display: flex; flex-direction: column; gap: 4px; }
.need-row { display: flex; align-items: center; gap: 5px; }
.need-icon { font-size: 9px; width: 10px; text-align: center; flex-shrink: 0; }
.bar-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.7s ease; }
.bar-fill.hunger { background: linear-gradient(90deg,#ff8c42,#ff6b6b); }
.bar-fill.energy { background: linear-gradient(90deg,#4e9eff,#63e6be); }
.bar-fill.mood   { background: linear-gradient(90deg,#3ecf8e,#a9e34b); }

/* ── Center: Map ── */
#map-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  overflow: hidden;
  padding: 16px;
  min-width: 0;
}

#canvas {
  display: block;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
}

/* ── Right: Events ── */
#feed-col {
  width: 272px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#event-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.event-item {
  display: flex;
  gap: 10px;
  padding: 7px 14px;
  transition: background 0.12s;
  border-left: 3px solid transparent; /* base — overridden per item */
}
.event-item:hover { background: var(--card); }
.event-item.event-drama {
  background: rgba(255, 140, 66, 0.06);
}
.drama-tag {
  font-size: 10px;
  margin: 0 4px;
}

.event-pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}

.event-body { flex: 1; min-width: 0; }
.event-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 2px;
}
.event-agent { font-weight: 600; font-size: 11px; text-transform: capitalize; }
.event-time  { font-size: 10px; color: var(--muted); flex-shrink: 0; }
.event-text  {
  font-size: 11px; color: var(--muted); line-height: 1.45;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ── Error banner ── */
#error-banner {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(255,107,107,0.95);
  color: #fff;
  text-align: center;
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 600;
  z-index: 500;
}
#error-banner.visible { display: block; }

/* ── Inspector modal ── */
#inspector {
  position: fixed;
  inset: 0;
  z-index: 400;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#inspector.visible { pointer-events: auto; opacity: 1; }

#inspector-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
}

#inspector-panel {
  position: absolute;
  top: 0; right: 0;
  width: 380px;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border-hi);
  overflow-y: auto;
  padding: 24px 22px;
  transform: translateX(32px);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  gap: 20px;
}
#inspector.visible #inspector-panel { transform: translateX(0); }

.inspector-head {
  display: flex;
  align-items: center;
  gap: 14px;
}
#ins-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.inspector-title { flex: 1; }
#ins-name { font-size: 20px; font-weight: 700; text-transform: capitalize; margin-bottom: 3px; }
#ins-loc  { font-size: 12px; color: var(--muted); }

#inspector-close {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
  align-self: flex-start;
}
#inspector-close:hover { color: var(--text); background: var(--card); }

/* Inspector activity badge (large) */
.ins-activity {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid;
}
.ins-activity .act-icon-lg { font-size: 22px; }
.ins-activity .act-info { flex: 1; min-width: 0; }
.ins-activity .act-type  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.ins-activity .act-desc  { font-size: 12px; color: var(--text); line-height: 1.4; }

.ins-section {}
.ins-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.ins-need-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.ins-need-label { width: 58px; font-size: 12px; color: var(--muted); }
.ins-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.ins-bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }
.ins-bar-fill.hunger { background: linear-gradient(90deg,#ff8c42,#ff6b6b); }
.ins-bar-fill.energy { background: linear-gradient(90deg,#4e9eff,#63e6be); }
.ins-bar-fill.mood   { background: linear-gradient(90deg,#3ecf8e,#a9e34b); }
.ins-need-val {
  width: 28px; text-align: right;
  font-size: 12px; color: var(--text);
  font-variant-numeric: tabular-nums;
}

.coins-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,212,59,0.08);
  border: 1px solid rgba(255,212,59,0.22);
  color: var(--yellow);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}

.diary-entry { margin-bottom: 16px; }
.diary-day { font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 5px; }
.diary-body { font-size: 12px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
</style>
</head>
<body>

<div id="error-banner">⚠ Reconnecting to server...</div>

<!-- ── Header ── -->
<header id="header">
  <div class="brand">
    <span>🏙</span>
    <span><span class="brand-dot">Gurgaon</span> Town Life</span>
  </div>
  <div class="hud-cluster">
    <div class="pill">
      <span class="val" id="hud-day">Day —</span>
      <span style="color:var(--border-hi)">|</span>
      <span class="val" id="hud-time">—:—</span>
    </div>
    <div class="pill running" id="pill-status">
      <span class="status-dot"></span>
      <span class="val" id="hud-status-text">Running</span>
    </div>
    <div class="pill">⚡ <span class="val" id="hud-speed">1×</span></div>
    <button id="llm-btn">⬡ Ollama</button>
  </div>
</header>

<!-- ── Town Overview Strip ── -->
<div id="overview">
  <!-- agent chips injected by JS -->
</div>

<!-- ── Layout ── -->
<div id="layout">

  <aside id="roster">
    <div class="col-title">Residents</div>
  </aside>

  <main id="map-wrap">
    <canvas id="canvas"></canvas>
  </main>

  <aside id="feed-col">
    <div class="col-title" style="padding:14px 16px 10px;border-bottom:1px solid var(--border)">Live Events</div>
    <div id="event-list"></div>
  </aside>

</div>

<!-- ── Avatar zoom overlay (global, outside inspector) ── -->
<div id="avatar-zoom"><img src="" alt=""></div>

<!-- ── Inspector ── -->
<div id="inspector">
<div id="inspector-backdrop"></div>
  <div id="inspector-panel">
    <div class="inspector-head">
      <div id="ins-avatar">A</div>
      <div class="inspector-title">
        <div id="ins-name">—</div>
        <div id="ins-loc">—</div>
      </div>
      <button id="inspector-close">✕</button>
    </div>

    <div id="ins-activity-wrap" class="ins-activity" style="border-color:rgba(99,104,130,0.3);background:rgba(99,104,130,0.07)">
      <span class="act-icon-lg" id="ins-act-icon">⚡</span>
      <div class="act-info">
        <div class="act-type" id="ins-act-type" style="color:var(--muted)">Activity</div>
        <div class="act-desc" id="ins-act-desc">—</div>
      </div>
    </div>

    <div class="ins-section">
      <div class="ins-label">Needs</div>
      <div class="ins-need-row">
        <span class="ins-need-label">Hunger</span>
        <div class="ins-bar-track"><div class="ins-bar-fill hunger" id="ins-hunger-bar" style="width:0%"></div></div>
        <span class="ins-need-val" id="ins-hunger-val">0</span>
      </div>
      <div class="ins-need-row">
        <span class="ins-need-label">Energy</span>
        <div class="ins-bar-track"><div class="ins-bar-fill energy" id="ins-energy-bar" style="width:0%"></div></div>
        <span class="ins-need-val" id="ins-energy-val">0</span>
      </div>
      <div class="ins-need-row">
        <span class="ins-need-label">Mood</span>
        <div class="ins-bar-track"><div class="ins-bar-fill mood" id="ins-mood-bar" style="width:0%"></div></div>
        <span class="ins-need-val" id="ins-mood-val">0</span>
      </div>
    </div>

    <div class="ins-section">
      <div class="ins-label">Wallet</div>
      <div class="coins-badge">🪙 <span id="ins-coins">0</span> coins</div>
    </div>

    <div class="ins-section">
      <div class="ins-label">Diary</div>
      <div id="ins-diary">
        <div style="color:var(--muted);font-size:12px;font-style:italic">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
'use strict';

// ── Activity detection ─────────────────────────────────────────────────────
// Maps last_action text → { icon, label, color, bgAlpha }

function detectActivity(action) {
  const s = (action || '').toLowerCase();
  if (s.includes('sleep'))
    return { icon:'💤', label:'Sleeping',   color:'#74c0fc' };
  if (s.includes('work') || s.includes('earn') || s.includes('coding') || s.includes('laptop') || s.includes('office'))
    return { icon:'💼', label:'Working',    color:'#ff8c42' };
  if (s.includes('eat') || s.includes('food') || s.includes('dhaba') || s.includes('meal') || s.includes('dal') || s.includes('roti') || s.includes('lunch') || s.includes('dinner') || s.includes('breakfast'))
    return { icon:'🍛', label:'Eating',     color:'#ffd43b' };
  if (s.includes('travel') || s.includes('commut') || s.includes('metro') || s.includes('moving') || s.includes('going to') || s.includes('heading'))
    return { icon:'🚇', label:'Commuting',  color:'#4dd0e1' };
  if (s.includes('socializ') || s.includes('chat') || s.includes('talk') || s.includes('gossip') || s.includes('conversat') || s.includes('meeting') || s.includes('meet'))
    return { icon:'💬', label:'Socializing', color:'#d0bfff' };
  if (s.includes('shop') || s.includes('buy') || s.includes('market') || s.includes('groceri') || s.includes('supermarket'))
    return { icon:'🛒', label:'Shopping',   color:'#a9e34b' };
  if (s.includes('jog') || s.includes('walk') || s.includes('exercise') || s.includes('run') || s.includes('gym'))
    return { icon:'🏃', label:'Exercising', color:'#63e6be' };
  if (s.includes('rest') || s.includes('relax') || s.includes('park') || s.includes('leisure') || s.includes('meditation') || s.includes('breath'))
    return { icon:'🌿', label:'Relaxing',   color:'#3ecf8e' };
  if (s.includes('drink') || s.includes('beer') || s.includes('chai') || s.includes('coffee') || s.includes('tea'))
    return { icon:'☕', label:'Drinking',   color:'#f783ac' };
  if (s.includes('read') || s.includes('study') || s.includes('learn'))
    return { icon:'📖', label:'Studying',   color:'#74c0fc' };
  // fallback — show a short snippet of the actual action
  const snippet = action && action.length > 18 ? action.slice(0,17)+'…' : (action || 'Idle');
  return { icon:'⚡', label: snippet, color:'#636882' };
}

// ── Narrative event feed ───────────────────────────────────────────────────
// Converts a raw event object { text, time } into { html, drama }

function capitalise(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function narrativise(ev) {
  const text = ev.text || '';
  const lower = text.toLowerCase();
  let drama = false;

  // Detect agent name prefix "arjun: ..." or "arjun ..."
  const agentMatch = text.match(/^([a-z]+)[:\s]/i);
  const agName = agentMatch ? agentMatch[1] : null;

  // Talk / chat / conversation → 💬, check for two agent names = drama
  if (/talk|chat|gossip|conversat|discuss|meeting with|speaks? (to|with)|tells?|asks?/i.test(lower)) {
    const ALL_AGENTS = ['anita','arjun','deepa','kavya','neha','priya','rahul','rohan','suresh','vikram'];
    const mentioned = ALL_AGENTS.filter(n => lower.includes(n) && n !== (agName||'').toLowerCase());
    drama = mentioned.length > 0;
    return { html: '💬 ' + capitalise(text), drama };
  }
  // Eat / food
  if (/eat|food|meal|lunch|dinner|breakfast|dal|roti|chai|dhaba|snack/i.test(lower))
    return { html: '🍛 ' + capitalise(text), drama: false };
  // Sleep
  if (/sleep|sleeping|bed|rest/i.test(lower))
    return { html: '💤 ' + capitalise(text), drama: false };
  // Work
  if (/work|earn|office|laptop|coding|meeting|project/i.test(lower))
    return { html: '💼 ' + capitalise(text), drama: false };
  // Move / travel
  if (/moved? to|heading|goes? to|travel|commut|metro/i.test(lower))
    return { html: '📍 ' + capitalise(text), drama: false };
  // Shop / buy
  if (/shop|buy|groceri|market|purchase/i.test(lower))
    return { html: '🛒 ' + capitalise(text), drama: false };
  // Fallback — just capitalise
  return { html: capitalise(text), drama: false };
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let mapData = null;
let locById = {};
let stateData = null;
let sprites = {};
let relEdges = {};
let locAgentCount = {};   // loc id → number of agents there (updated each tick)
let inspectorAgent = null;
let animT = 0;
let BOX_W = 140, BOX_H = 90;  // adaptive box dims, updated by updateBoxDims()
let avatarImages = {};         // name → HTMLImageElement (may still be loading)

// ── Canvas sizing ──────────────────────────────────────────────────────────

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width  = Math.max(200, wrap.clientWidth  - 32);
  canvas.height = Math.max(200, wrap.clientHeight - 32);
  updateBoxDims();
  if (stateData) onStateUpdate();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function tile2px(tx, ty) {
  const padX = 80, padY = 55;
  const sx = (canvas.width  - padX*2) / 28;
  const sy = (canvas.height - padY*2) / 18;
  return { x: padX + tx*sx, y: canvas.height - padY - ty*sy };
}

function locCenter(locId) {
  const l = locById[locId];
  if (!l) return { x: canvas.width/2, y: canvas.height/2 };
  return tile2px(l.tile_x, l.tile_y);
}

// BFS on the client-side map graph — returns an array of location IDs from
// startId to goalId (inclusive). Falls back to [start, goal] if no path found.
function clientBFS(startId, goalId) {
  if (startId === goalId) return [startId];
  if (!mapData) return [startId, goalId];
  const adj = {};
  for (const loc of mapData.locations) adj[loc.id] = loc.connected_to || [];
  const queue = [[startId]];
  const visited = new Set([startId]);
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    for (const nb of (adj[cur] || [])) {
      if (nb === goalId) return [...path, nb];
      if (!visited.has(nb)) { visited.add(nb); queue.push([...path, nb]); }
    }
  }
  return [startId, goalId];
}

// Radial placement: agents spread in a circle around the location centre,
// constrained so they never leave the location box boundary.
function agentOffset(idx, total) {
  if (total <= 1) return { dx: 0, dy: 0 };
  const AGENT_R = 19;  // avatar radius (16) + mood ring (2.5), rounded up
  // Maximum radial reach that keeps the agent circle inside the box.
  const maxR = Math.min(BOX_W, BOX_H) / 2 - AGENT_R - 4;
  // Desired radius grows with crowd but is capped to stay in-bounds.
  const r = Math.min(Math.max(maxR, 12), 12 + total * 4);
  const angle = (idx / total) * Math.PI * 2 - Math.PI / 2; // start at top
  return { dx: Math.cos(angle) * r, dy: Math.sin(angle) * r };
}

// pixels-per-frame walking speed (60 fps assumed).
// ~4 px/frame → adjacent hop ≈ 0.5 s, cross-map (4 hops) ≈ 2 s.
const WALK_SPEED = 4;

// Called once per state update.  Builds a waypoint chain so the sprite
// visually walks through every intermediate location on its path.
function updateSpriteTarget(name, newLocId, finalX, finalY) {
  if (!sprites[name]) {
    sprites[name] = { displayX: finalX, displayY: finalY,
                      waypoints: [], locId: newLocId };
    return;
  }
  const sp = sprites[name];
  const prevLocId = sp.locId || newLocId;
  sp.locId = newLocId;

  if (prevLocId !== newLocId) {
    // Build path and create a waypoint for each intermediate location centre,
    // then the final radially-offset position at the destination.
    const path = clientBFS(prevLocId, newLocId);
    const wps = [];
    for (let i = 1; i < path.length - 1; i++) {
      const c = locCenter(path[i]);
      wps.push({ x: c.x, y: c.y });
    }
    wps.push({ x: finalX, y: finalY });
    sp.waypoints = wps;
  } else {
    // Same location — update final position (radial slot may have shifted).
    if (sp.waypoints.length === 0) {
      sp.waypoints = [{ x: finalX, y: finalY }];
    } else {
      sp.waypoints[sp.waypoints.length - 1] = { x: finalX, y: finalY };
    }
  }
}

// Advance a sprite one animation frame toward its next waypoint.
function advanceSpritePosition(sp) {
  if (!sp.waypoints || sp.waypoints.length === 0) return;
  const wp = sp.waypoints[0];
  const dx = wp.x - sp.displayX;
  const dy = wp.y - sp.displayY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist <= WALK_SPEED) {
    sp.displayX = wp.x;
    sp.displayY = wp.y;
    sp.waypoints.shift();        // arrived — move to next waypoint
  } else {
    sp.displayX += (dx / dist) * WALK_SPEED;
    sp.displayY += (dy / dist) * WALK_SPEED;
  }
}

function rrect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y); cx.lineTo(x+w-r, y); cx.arcTo(x+w, y, x+w, y+r, r);
  cx.lineTo(x+w, y+h-r); cx.arcTo(x+w, y+h, x+w-r, y+h, r);
  cx.lineTo(x+r, y+h); cx.arcTo(x, y+h, x, y+h-r, r);
  cx.lineTo(x, y+r); cx.arcTo(x, y, x+r, y, r);
  cx.closePath();
}

// Box dimensions — derived from tile spacing so they scale with canvas size.
// Tightest horizontal gap: 6 tiles (sector29 ↔ supermarket).
// Tightest vertical gap:   5 tiles (dhaba ↔ sector29).
// We use 85% of each gap so there's always a visible margin between boxes.
// NOTE: BOX_W/BOX_H are declared near the top of the IIFE (temporal dead zone fix).
function updateBoxDims() {
  const padX = 80, padY = 55;
  const sx = (canvas.width  - padX * 2) / 28;
  const sy = (canvas.height - padY * 2) / 18;
  BOX_W = Math.max(120, sx * 6 * 0.85);
  BOX_H = Math.max(80,  sy * 5 * 0.85);
}

// ── Helpers ────────────────────────────────────────────────────────────────

function setEl(id, v) { const e=document.getElementById(id); if(e) e.textContent=v; }
function setW(id, v)  { const e=document.getElementById(id); if(e) e.style.width=Math.max(0,Math.min(100,v||0))+'%'; }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hex2rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── State update ───────────────────────────────────────────────────────────

function onStateUpdate() {
  if (!stateData || !stateData.agents) return;

  // Pre-count agents per location so radial radius is correct from the start.
  locAgentCount = {};
  for (const name of Object.keys(stateData.agents)) {
    const lid = stateData.agents[name].location;
    locAgentCount[lid] = (locAgentCount[lid] || 0) + 1;
  }

  const groupIdx = {};
  for (const name of Object.keys(stateData.agents).sort()) {
    const ag = stateData.agents[name];
    const lid = ag.location;
    const idx = groupIdx[lid] || 0;
    groupIdx[lid] = idx + 1;
    const total = locAgentCount[lid] || 1;

    const c = locCenter(lid);
    const { dx, dy } = agentOffset(idx, total);
    const tx = c.x + dx, ty = c.y + dy;
    updateSpriteTarget(name, lid, tx, ty);

    // Track action change time for idle-fade (Story 8.1)
    const sp = sprites[name];
    if (sp) {
      const prevAction = sp.lastAction || '';
      if (ag.last_action !== prevAction) {
        sp.lastAction = ag.last_action;
        sp.lastActionTs = Date.now();
      }
    }

    // Activity detection
    const act = detectActivity(ag.last_action);

    // ── Roster card ──
    const badge = document.getElementById('ab-' + name);
    if (badge) {
      badge.style.color = act.color;
      badge.style.borderColor = hex2rgba(act.color, 0.3);
      badge.style.background  = hex2rgba(act.color, 0.1);
    }
    setEl('ab-icon-'  + name, act.icon);
    setEl('ab-label-' + name, act.label);

    const loc = locById[ag.location];
    setEl('cl-' + name, '📍 ' + (loc ? loc.display_name : ag.location || '—'));
    setW('ch-' + name, ag.hunger);
    setW('ce-' + name, ag.energy);
    setW('cm-' + name, ag.mood);

    // ── Overview strip ──
    setEl('ov-icon-' + name, act.icon);
    const lbl = document.getElementById('ov-lbl-' + name);
    if (lbl) { lbl.textContent = act.label; lbl.style.color = act.color; }
  }

  // Header HUD
  setEl('hud-day', 'Day ' + (stateData.day ?? '—'));
  setEl('hud-time', stateData.time_str || '—:—');
  setEl('hud-speed', (stateData.speed ?? 1) + '×');
  const pill = document.getElementById('pill-status');
  const pillTxt = document.getElementById('hud-status-text');
  if (stateData.paused) { pill.className='pill paused'; pillTxt.textContent='Paused'; }
  else                  { pill.className='pill running'; pillTxt.textContent='Running'; }
  setLLMButton(stateData.llm_primary);

  // Event feed
  const evList = document.getElementById('event-list');
  evList.innerHTML = '';
  const events = (stateData.events || []).slice(-30).reverse();
  for (const ev of events) {
    const text = ev.text || '';
    const m = text.match(/^([a-z]+)[:\s]/i);
    const agName = m ? m[1].toLowerCase() : null;
    const color = (agName && AGENT_COLOR[agName]) ? AGENT_COLOR[agName] : '#636882';
    const { html: narr, drama } = narrativise(ev);

    const div = document.createElement('div');
    div.className = 'event-item' + (drama ? ' event-drama' : '');
    div.style.borderLeft = `3px solid ${color}`;
    div.innerHTML =
      `<div class="event-body" style="padding-left:8px">` +
        `<div class="event-head">` +
          `<span class="event-agent" style="color:${color}">${esc(agName || 'system')}</span>` +
          (drama ? `<span class="drama-tag">🔥</span>` : '') +
          `<span class="event-time">${esc((ev.time || '').replace(/:\d\d$/, ''))}</span>` +
        `</div>` +
        `<div class="event-text">${esc(narr)}</div>` +
      `</div>`;
    evList.appendChild(div);
  }

  if (inspectorAgent) refreshInspectorLive();
}

// ── Canvas draw loop ───────────────────────────────────────────────────────

function draw(ts) {
  animT = ts || 0;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0c0d14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (mapData) {
    // 1. Connection lines
    const drawn = new Set();
    for (const loc of mapData.locations) {
      const c1 = tile2px(loc.tile_x, loc.tile_y);
      for (const other of (loc.connected_to || [])) {
        const key = loc.id < other ? loc.id+'|'+other : other+'|'+loc.id;
        if (drawn.has(key) || !locById[other]) continue;
        drawn.add(key);
        const c2 = tile2px(locById[other].tile_x, locById[other].tile_y);
        const g = ctx.createLinearGradient(c1.x,c1.y,c2.x,c2.y);
        g.addColorStop(0,'rgba(78,158,255,0.25)');
        g.addColorStop(1,'rgba(78,158,255,0.08)');
        ctx.strokeStyle = g; ctx.lineWidth = 1.5;
        ctx.setLineDash([5,7]);
        ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // 2. Location boxes — size comes from BOX_W/BOX_H (adaptive to canvas)
    const bw = BOX_W, bh = BOX_H;
    const iconFs  = Math.max(14, Math.floor(bh * 0.20));
    const nameFs  = Math.max(10, Math.floor(bh * 0.13));
    const name2Fs = Math.max(9,  Math.floor(bh * 0.11));

    for (const loc of mapData.locations) {
      const c = tile2px(loc.tile_x, loc.tile_y);
      const bx = c.x-bw/2, by = c.y-bh/2;
      const borderColor = TYPE_BORDER_COLOR[loc.type] || '#4e9eff';

      ctx.shadowColor = borderColor+'88'; ctx.shadowBlur = 14;
      const g = ctx.createLinearGradient(bx,by,bx,by+bh);
      g.addColorStop(0, TYPE_FILL_TOP[loc.type]||'#1e1e30');
      g.addColorStop(1, TYPE_FILL_BOT[loc.type]||'#111128');
      ctx.fillStyle = g;
      rrect(ctx, bx, by, bw, bh, 10); ctx.fill();
      ctx.shadowBlur = 0;

      ctx.strokeStyle = borderColor; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.65;
      rrect(ctx, bx, by, bw, bh, 10); ctx.stroke(); ctx.globalAlpha = 1;

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = iconFs + 'px system-ui';
      ctx.fillText(TYPE_ICON[loc.type]||'📍', c.x, by + bh*0.30);

      ctx.font = '600 ' + nameFs + 'px Inter, system-ui'; ctx.fillStyle = '#c8cae0';
      const words = (loc.display_name || loc.id).split(' ');
      const line1 = words.slice(0,2).join(' ');
      const line2 = words.length > 2 ? words.slice(2).join(' ') : null;
      if (line2) {
        ctx.fillText(line1, c.x, by+bh*0.62);
        ctx.font = name2Fs + 'px Inter, system-ui'; ctx.fillStyle='#8b8eaa';
        ctx.fillText(line2, c.x, by+bh*0.80);
      } else {
        ctx.fillText(line1, c.x, by+bh*0.70);
      }

      // Agent count badge — top-right corner of box
      const n = locAgentCount[loc.id] || 0;
      if (n > 0) {
        const badgeR = 11;
        const bx2 = bx + bw - 1, by2 = by + 1;
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(bx2, by2, badgeR, 0, Math.PI*2);
        ctx.fillStyle = n >= 5 ? '#ff8c42' : '#4e9eff';
        ctx.fill();
        ctx.font = 'bold 9px Inter, system-ui';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(n, bx2, by2);
      }
    }
  }

  // 3. Co-location relationship lines
  if (stateData && stateData.agents) {
    const byLoc = {};
    for (const n of Object.keys(stateData.agents)) {
      const lid = stateData.agents[n].location;
      if (lid) (byLoc[lid] = byLoc[lid]||[]).push(n);
    }
    ctx.setLineDash([]);
    for (const lid of Object.keys(byLoc)) {
      const ns = byLoc[lid];
      for (let i=0; i<ns.length; i++) for (let j=i+1; j<ns.length; j++) {
        const a=ns[i], b=ns[j];
        const sAB=relEdges[a+'|'+b], sBA=relEdges[b+'|'+a];
        const isRomantic  = sAB==='romantic'  || sBA==='romantic';
        const isFriendly  = sAB==='friendly'  || sBA==='friendly';
        const isHostile   = sAB==='hostile'   || sBA==='hostile';
        let col, lw;
        if (isRomantic)      { col='rgba(255,105,180,0.85)'; lw=2.5; }
        else if (isHostile)  { col='rgba(255,107,107,0.65)'; lw=1.5; }
        else if (isFriendly) { col='rgba(62,207,142,0.65)';  lw=1.5; }
        else                 { col='rgba(99,104,130,0.35)';   lw=1;   }
        const pa=sprites[a], pb=sprites[b];
        if (!pa||!pb) continue;
        ctx.strokeStyle=col; ctx.lineWidth=lw;
        ctx.beginPath(); ctx.moveTo(pa.displayX,pa.displayY); ctx.lineTo(pb.displayX,pb.displayY); ctx.stroke();
        if (isRomantic) {
          const mx=(pa.displayX+pb.displayX)/2, my=(pa.displayY+pb.displayY)/2;
          ctx.font='13px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('♥', mx, my);
        }
      }
    }
  }

  // 4. Agents
  if (stateData && stateData.agents) {
    for (const name of Object.keys(stateData.agents).sort()) {
      const sp = sprites[name];
      if (!sp) continue;
      advanceSpritePosition(sp);

      const ag = stateData.agents[name];
      const x=sp.displayX, y=sp.displayY;
      const r = 16;
      const color = AGENT_COLOR[name] || '#888';
      const mood = ag.mood ?? 50;
      const act = detectActivity(ag.last_action);
      const isSelected = name === inspectorAgent;

      // Pulse for selected
      if (isSelected) {
        const pr = r+8+Math.sin(animT/380)*2.5;
        ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.globalAlpha=0.35; ctx.stroke(); ctx.globalAlpha=1;
      }

      // Crisis halo (drawn under sprite so it glows outward) — Story 8.2
      const hunger = ag.hunger ?? 0;
      const energy = ag.energy ?? 100;
      const inHungerCrisis = hunger > 75;
      const inEnergyCrisis = energy < 25;
      const inCrisis = (inHungerCrisis || inEnergyCrisis) && !(ag.last_action||'').toLowerCase().includes('sleep');

      if (inCrisis) {
        const haloColor = inHungerCrisis ? '#ff8c42' : '#74c0fc';  // orange for hunger, blue for energy
        const pulse = Math.sin(animT / 500);                        // oscillates -1 to 1
        const haloR  = r + 8 + pulse * 4;                          // radius pulses 12–20px beyond sprite
        const haloAlpha = 0.35 + pulse * 0.15;                     // alpha pulses 0.20–0.50

        ctx.save();
        ctx.beginPath(); ctx.arc(x, y, haloR, 0, Math.PI * 2);
        ctx.strokeStyle = haloColor;
        ctx.lineWidth = 3;
        ctx.globalAlpha = haloAlpha;
        ctx.shadowColor = haloColor;
        ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.restore();
      }

      ctx.shadowColor=color; ctx.shadowBlur=12;

      // Mood ring
      const moodColor = mood>=70 ? '#3ecf8e' : mood>=40 ? '#ffd43b' : '#ff6b6b';
      ctx.beginPath(); ctx.arc(x,y,r+2.5,0,Math.PI*2);
      ctx.fillStyle=moodColor; ctx.fill();

      // Avatar
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      ctx.shadowBlur=0;

      // Portrait or initial fallback
      const img = avatarImages[name];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.save();
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();
        ctx.drawImage(img, x-r, y-r, r*2, r*2);
        ctx.restore();
      } else {
        ctx.fillStyle='rgba(255,255,255,0.93)';
        ctx.font='bold 12px Inter, system-ui';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(name[0].toUpperCase(), x, y);
      }

      // Name tag
      ctx.font='500 9px Inter, system-ui'; ctx.fillStyle='#c8cae0';
      ctx.textBaseline='bottom';
      ctx.fillText(name, x, y-r-5);

      // Activity bubble — colored, larger, readable
      const action = (ag.last_action || '').trim();

      // Idle-fade: bubble fades to 30% after 8 real seconds with no action change (Story 8.1)
      const msSinceAction = Date.now() - (sp.lastActionTs || Date.now());
      const bubbleAlpha = msSinceAction > 8000 ? 0.3 : 1.0;

      if (action && action !== 'waking up' && action !== 'sleeping') {
        ctx.globalAlpha = bubbleAlpha;
        const bubbleText = act.icon + ' ' + act.label;
        ctx.font = '600 10px Inter, system-ui';
        const tw = ctx.measureText(bubbleText).width + 14;
        const th = 17;
        const bx = x - tw/2, by = y + r + 5;

        // Colored background
        ctx.fillStyle = hex2rgba(act.color, 0.15);
        rrect(ctx, bx, by, tw, th, 6); ctx.fill();
        ctx.strokeStyle = hex2rgba(act.color, 0.45); ctx.lineWidth=1;
        rrect(ctx, bx, by, tw, th, 6); ctx.stroke();

        ctx.fillStyle = act.color;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(bubbleText, x, by+th/2);
        ctx.globalAlpha = 1.0;
      } else if (action === 'sleeping') {
        // Sleeping — just show the icon large
        ctx.globalAlpha = bubbleAlpha;
        ctx.font = '14px system-ui';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('💤', x, y - r - 16);
        ctx.globalAlpha = 1.0;
      }
    }
  }

  requestAnimationFrame(draw);
}

// helper for canvas color manipulation
function hex2rgba(hex, a) {
  if (!hex || hex[0]!=='#') return `rgba(99,104,130,${a})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Inspector ──────────────────────────────────────────────────────────────

async function openInspector(name) {
  inspectorAgent = name;
  const color = AGENT_COLOR[name] || '#888';

  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector('.agent-card[data-name="'+name+'"]');
  if (card) card.classList.add('active');

  const av = document.getElementById('ins-avatar');
  av.style.background = color; av.style.overflow = 'hidden'; av.style.padding = '0';
  av.innerHTML = `<img src="/api/agent/${name}/avatar" ` +
    `style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block" ` +
    `onerror="this.style.display='none';this.parentElement.textContent='${name[0].toUpperCase()}'">`;

  document.getElementById('ins-name').textContent = name;
  document.getElementById('inspector').classList.add('visible');
  refreshInspectorLive();

  const diaryEl = document.getElementById('ins-diary');
  diaryEl.innerHTML = '<div style="color:var(--muted);font-size:12px;font-style:italic">Loading...</div>';
  try {
    const data = await fetchJSON('/api/agent/'+name+'/diary');
    const entries = (data.entries||[]).slice(0,5);
    if (!entries.length) {
      diaryEl.innerHTML='<div style="color:var(--muted);font-size:12px;font-style:italic">No diary entries yet.</div>';
    } else {
      diaryEl.innerHTML='';
      for (const ent of entries) {
        const div=document.createElement('div'); div.className='diary-entry';
        div.innerHTML=`<div class="diary-day">${esc(ent.day_header||'')}</div><div class="diary-body">${esc(ent.body||'')}</div>`;
        diaryEl.appendChild(div);
      }
    }
  } catch(e) {
    diaryEl.innerHTML='<div style="color:var(--red);font-size:12px">Failed to load diary.</div>';
  }
}

function refreshInspectorLive() {
  if (!inspectorAgent || !stateData || !stateData.agents) return;
  const ag = stateData.agents[inspectorAgent];
  if (!ag) return;
  const loc = locById[ag.location];
  setEl('ins-loc', '📍 ' + (loc ? loc.display_name : ag.location||'—'));

  // Activity block in inspector
  const act = detectActivity(ag.last_action);
  const color = AGENT_COLOR[inspectorAgent] || '#888';
  const wrap = document.getElementById('ins-activity-wrap');
  if (wrap) {
    wrap.style.borderColor = hex2rgba(act.color, 0.35);
    wrap.style.background  = hex2rgba(act.color, 0.08);
  }
  setEl('ins-act-icon', act.icon);
  const typeEl = document.getElementById('ins-act-type');
  if (typeEl) { typeEl.textContent=act.label; typeEl.style.color=act.color; }
  setEl('ins-act-desc', ag.last_action || '—');

  const setBar = (bId, vId, val) => {
    const v=Math.max(0,Math.min(100,val||0));
    const b=document.getElementById(bId); if(b) b.style.width=v+'%';
    const e=document.getElementById(vId); if(e) e.textContent=Math.round(v);
  };
  setBar('ins-hunger-bar','ins-hunger-val', ag.hunger);
  setBar('ins-energy-bar','ins-energy-val', ag.energy);
  setBar('ins-mood-bar',  'ins-mood-val',   ag.mood);
  const c=document.getElementById('ins-coins'); if(c) c.textContent=ag.coins??0;
}

function closeInspector() {
  inspectorAgent = null;
  document.getElementById('inspector').classList.remove('visible');
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
}

document.getElementById('inspector-close').addEventListener('click', closeInspector);
document.getElementById('inspector-backdrop').addEventListener('click', closeInspector);
document.addEventListener('keydown', e => { if(e.key==='Escape') closeInspector(); });

// ── Avatar zoom ────────────────────────────────────────────────────────────

const zoomEl  = document.getElementById('avatar-zoom');
const zoomImg = zoomEl.querySelector('img');
let zoomTimer = null;

function showZoom(name, anchorEl) {
  const src = '/api/agent/' + name + '/avatar';
  zoomImg.src = src;
  zoomImg.onerror = () => { zoomEl.classList.remove('visible'); };
  positionZoom(anchorEl);
  zoomEl.classList.add('visible');
}

function positionZoom(anchorEl) {
  if (!anchorEl) return;
  const r = anchorEl.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;
  const size = 240;
  let left = cx - size / 2;
  let top  = cy - size - 16;           // prefer above
  if (top < 8) top = cy + r.height + 16; // flip below if no room
  left = Math.max(8, Math.min(left, window.innerWidth  - size - 8));
  top  = Math.max(8, Math.min(top,  window.innerHeight - size - 8));
  zoomEl.style.left = left + 'px';
  zoomEl.style.top  = top  + 'px';
}

function hideZoom() { zoomEl.classList.remove('visible'); }

// Wire up #ins-avatar hover (re-wired each time inspector opens)
document.getElementById('ins-avatar').addEventListener('mouseenter', function() {
  if (inspectorAgent) showZoom(inspectorAgent, this);
});
document.getElementById('ins-avatar').addEventListener('mouseleave', hideZoom);

// Canvas: show zoom when hovering over a sprite
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scx = canvas.width / rect.width, scy = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scx, cy = (e.clientY - rect.top) * scy;
  let hit = null;
  for (const name of Object.keys(sprites)) {
    const sp = sprites[name];
    const dx = cx - sp.displayX, dy = cy - sp.displayY;
    if (dx*dx + dy*dy <= (16+4)*(16+4)) { hit = name; break; }
  }
  if (hit) {
    // Use a fake anchor positioned at the sprite's screen coords
    const spriteScreenX = sprites[hit].displayX / scx + rect.left;
    const spriteScreenY = sprites[hit].displayY / scy + rect.top;
    const fakeAnchor = { getBoundingClientRect: () => ({
      left: spriteScreenX - 16, top: spriteScreenY - 16,
      width: 32, height: 32
    })};
    if (!zoomEl.classList.contains('visible') || zoomImg.dataset.for !== hit) {
      zoomImg.dataset.for = hit;
      showZoom(hit, fakeAnchor);
    }
  } else {
    if (zoomImg.dataset.for) { zoomImg.dataset.for = ''; hideZoom(); }
  }
});
canvas.addEventListener('mouseleave', hideZoom);

canvas.addEventListener('click', e => {
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
  for (const name of Object.keys(sprites)) {
    const sp=sprites[name];
    const dx=cx-sp.displayX, dy=cy-sp.displayY;
    if (dx*dx+dy*dy<=(16+4)*(16+4)) { openInspector(name); return; }
  }
  closeInspector();
});

// ── API ────────────────────────────────────────────────────────────────────

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

const banner = document.getElementById('error-banner');

async function loadMap(retries) {
  retries = retries===undefined ? 6 : retries;
  try {
    mapData = await fetchJSON('/api/map');
    locById = {};
    (mapData.locations||[]).forEach(l => { locById[l.id]=l; });
  } catch(e) {
    if (retries>0) setTimeout(() => loadMap(retries-1), 1200);
    else banner.textContent='✕ Cannot reach server. Is main.py running?';
  }
}

async function pollState() {
  try {
    stateData = await fetchJSON('/api/state');
    banner.classList.remove('visible');
    onStateUpdate();
  } catch(e) { banner.classList.add('visible'); }
}

async function pollRelationships() {
  try {
    const data = await fetchJSON('/api/relationships');
    const next={};
    for (const e of (data.edges||[])) next[e.from+'|'+e.to]=e.sentiment;
    relEdges = next;
  } catch(e) {}
}

function setLLMButton(provider) {
  const btn=document.getElementById('llm-btn');
  btn.textContent = (provider||'').toLowerCase()==='gemini' ? '✦ Gemini' : '⬡ Ollama';
}

async function toggleLLM() {
  if (!stateData) return;
  const cur=(stateData.llm_primary||'ollama').toLowerCase();
  const next=cur==='ollama' ? 'gemini' : 'ollama';
  const btn=document.getElementById('llm-btn');
  btn.disabled=true;
  try { await fetchJSON('/api/llm/'+next, {method:'POST'}); await pollState(); }
  catch(e) {}
  finally { btn.disabled=false; }
}
document.getElementById('llm-btn').addEventListener('click', toggleLLM);

buildRoster();
loadMap();
pollState();
pollRelationships();
setInterval(pollState, 2000);
setInterval(pollRelationships, 30000);
requestAnimationFrame(draw);

})();
</script>
